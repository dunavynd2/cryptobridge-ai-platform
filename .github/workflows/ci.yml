name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff bandit semgrep

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with pytest
        run: pytest --cov=. --cov-report=xml || echo "No tests yet"

      - name: Security scan with Bandit
        run: bandit -r . -ll || echo "Bandit scan completed"

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cryptobridge-ai .